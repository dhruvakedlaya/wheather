<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast - Dark Edition with Email Alerts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes starfield {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-100vh) rotate(360deg); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(60px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.08); opacity: 0.9; }
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(79, 209, 197, 0.3), 0 0 40px rgba(79, 209, 197, 0.2); }
            50% { box-shadow: 0 0 30px rgba(79, 209, 197, 0.5), 0 0 60px rgba(79, 209, 197, 0.3); }
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes neonPulse {
            0%, 100% { 
                text-shadow: 
                    0 0 10px rgba(79, 209, 197, 0.8),
                    0 0 20px rgba(79, 209, 197, 0.6),
                    0 0 30px rgba(79, 209, 197, 0.4),
                    0 0 40px rgba(79, 209, 197, 0.2);
            }
            50% { 
                text-shadow: 
                    0 0 20px rgba(79, 209, 197, 1),
                    0 0 30px rgba(79, 209, 197, 0.8),
                    0 0 40px rgba(79, 209, 197, 0.6),
                    0 0 50px rgba(79, 209, 197, 0.4);
            }
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 25%, #16213e 50%, #0f3460 75%, #0a0a0a 100%);
            background-size: 400% 400%;
            animation: gradientMove 20s ease infinite;
            min-height: 100vh;
            color: #fff;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, rgba(255, 255, 255, 0.3), transparent),
                radial-gradient(2px 2px at 60px 70px, rgba(255, 255, 255, 0.2), transparent),
                radial-gradient(1px 1px at 50px 50px, rgba(255, 255, 255, 0.4), transparent),
                radial-gradient(1px 1px at 130px 80px, rgba(255, 255, 255, 0.3), transparent),
                radial-gradient(2px 2px at 90px 10px, rgba(255, 255, 255, 0.25), transparent);
            background-size: 200px 200px;
            background-repeat: repeat;
            animation: starfield 200s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInUp 1s ease;
        }

        h1 {
            font-size: 4em;
            font-weight: 900;
            background: linear-gradient(135deg, #4fd1c5 0%, #00d4ff 50%, #4fd1c5 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s linear infinite, neonPulse 2s ease-in-out infinite;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.3em;
            color: #4fd1c5;
            font-weight: 300;
            opacity: 0.9;
            animation: fadeInUp 1.2s ease;
        }

        .search-container {
            background: rgba(15, 15, 25, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            border-radius: 30px;
            padding: 50px;
            margin-bottom: 40px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.6),
                inset 0 1px 1px rgba(255, 255, 255, 0.1),
                0 0 60px rgba(79, 209, 197, 0.1);
            border: 2px solid rgba(79, 209, 197, 0.2);
            animation: fadeInUp 1.4s ease, glow 3s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .search-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(79, 209, 197, 0.1) 0%, transparent 70%);
            animation: spin 20s linear infinite;
            pointer-events: none;
        }

        .search-box {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        input[type="text"], input[type="email"] {
            flex: 1;
            min-width: 280px;
            padding: 22px 30px;
            border: 2px solid rgba(79, 209, 197, 0.3);
            border-radius: 20px;
            background: rgba(10, 10, 15, 0.6);
            color: white;
            font-size: 17px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        input[type="text"]::placeholder, input[type="email"]::placeholder {
            color: rgba(79, 209, 197, 0.5);
        }

        input[type="text"]:focus, input[type="email"]:focus {
            outline: none;
            background: rgba(10, 10, 15, 0.8);
            border-color: #4fd1c5;
            box-shadow: 
                0 0 30px rgba(79, 209, 197, 0.4),
                0 0 60px rgba(79, 209, 197, 0.2),
                inset 0 0 20px rgba(79, 209, 197, 0.1);
            transform: translateY(-3px);
        }

        button {
            padding: 22px 45px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(135deg, #4fd1c5 0%, #00d4ff 100%);
            color: #0a0a0a;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 
                0 4px 20px rgba(79, 209, 197, 0.4),
                0 8px 40px rgba(79, 209, 197, 0.2);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        button:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 
                0 6px 30px rgba(79, 209, 197, 0.6),
                0 12px 60px rgba(79, 209, 197, 0.3);
        }

        button:active {
            transform: translateY(-2px) scale(0.98);
        }

        .location-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 
                0 4px 20px rgba(240, 147, 251, 0.4),
                0 8px 40px rgba(240, 147, 251, 0.2);
        }

        .location-btn:hover {
            box-shadow: 
                0 6px 30px rgba(240, 147, 251, 0.6),
                0 12px 60px rgba(240, 147, 251, 0.3);
        }

        .email-alert-section {
            background: rgba(15, 15, 25, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.6),
                inset 0 1px 1px rgba(255, 255, 255, 0.1),
                0 0 60px rgba(240, 147, 251, 0.1);
            border: 2px solid rgba(240, 147, 251, 0.3);
            animation: fadeInUp 1.6s ease;
        }

        .email-alert-section h3 {
            font-size: 1.8em;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .email-alert-section p {
            color: rgba(240, 147, 251, 0.8);
            margin-bottom: 20px;
            font-size: 1.1em;
        }

        .email-form {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .form-group {
            flex: 1;
            min-width: 250px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #4fd1c5;
            font-weight: 600;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .email-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 
                0 4px 20px rgba(240, 147, 251, 0.4),
                0 8px 40px rgba(240, 147, 251, 0.2);
        }

        .email-btn:hover {
            box-shadow: 
                0 6px 30px rgba(240, 147, 251, 0.6),
                0 12px 60px rgba(240, 147, 251, 0.3);
        }

        .subscription-status {
            margin-top: 20px;
            padding: 15px 25px;
            border-radius: 15px;
            font-size: 1em;
            display: none;
        }

        .subscription-status.success {
            background: rgba(34, 197, 94, 0.2);
            border: 2px solid rgba(34, 197, 94, 0.5);
            color: #4ade80;
        }

        .subscription-status.info {
            background: rgba(79, 209, 197, 0.2);
            border: 2px solid rgba(79, 209, 197, 0.5);
            color: #4fd1c5;
        }

        .loader {
            display: none;
            width: 70px;
            height: 70px;
            border: 5px solid rgba(79, 209, 197, 0.2);
            border-top: 5px solid #4fd1c5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 40px auto;
            box-shadow: 0 0 30px rgba(79, 209, 197, 0.5);
        }

        .current-weather {
            background: rgba(15, 15, 25, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            border-radius: 30px;
            padding: 50px;
            margin-bottom: 40px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.6),
                inset 0 1px 1px rgba(255, 255, 255, 0.1),
                0 0 60px rgba(79, 209, 197, 0.1);
            border: 2px solid rgba(79, 209, 197, 0.2);
            display: none;
            position: relative;
            overflow: hidden;
        }

        .current-weather::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.05) 0%, transparent 70%);
            animation: spin 30s linear infinite reverse;
            pointer-events: none;
        }

        .current-weather.show {
            display: block;
            animation: fadeInUp 0.8s ease, glow 3s ease-in-out infinite;
        }

        .weather-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 25px;
            position: relative;
            z-index: 1;
        }

        .location-info h2 {
            font-size: 3em;
            margin-bottom: 8px;
            animation: slideInLeft 0.8s ease;
            background: linear-gradient(135deg, #fff 0%, #4fd1c5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .location-info .date {
            font-size: 1.2em;
            color: #4fd1c5;
            animation: slideInLeft 1s ease;
        }

        .main-weather {
            display: flex;
            align-items: center;
            gap: 40px;
            margin: 40px 0;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        .weather-icon-container {
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(79, 209, 197, 0.6));
        }

        .weather-icon {
            width: 150px;
            height: 150px;
            animation: pulse 3s ease-in-out infinite;
        }

        .temp-display {
            flex: 1;
            min-width: 250px;
        }

        .temperature {
            font-size: 6em;
            font-weight: 900;
            line-height: 1;
            animation: scaleIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: linear-gradient(135deg, #fff 0%, #4fd1c5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(79, 209, 197, 0.5);
        }

        .weather-description {
            font-size: 2em;
            margin: 15px 0;
            text-transform: capitalize;
            color: #4fd1c5;
            animation: slideInRight 1s ease;
            font-weight: 300;
        }

        .feels-like {
            font-size: 1.3em;
            color: rgba(79, 209, 197, 0.8);
            animation: slideInRight 1.2s ease;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 25px;
            margin-top: 40px;
            position: relative;
            z-index: 1;
        }

        .detail-card {
            background: rgba(10, 10, 15, 0.6);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid rgba(79, 209, 197, 0.2);
            animation: scaleIn 0.6s ease backwards;
            position: relative;
            overflow: hidden;
        }

        .detail-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(79, 209, 197, 0.2), transparent);
            transition: left 0.5s;
        }

        .detail-card:hover::before {
            left: 100%;
        }

        .detail-card:hover {
            transform: translateY(-10px) scale(1.05);
            background: rgba(15, 20, 30, 0.8);
            box-shadow: 
                0 12px 30px rgba(0, 0, 0, 0.4),
                0 0 40px rgba(79, 209, 197, 0.3);
            border-color: #4fd1c5;
        }

        .detail-card:nth-child(1) { animation-delay: 0.1s; }
        .detail-card:nth-child(2) { animation-delay: 0.2s; }
        .detail-card:nth-child(3) { animation-delay: 0.3s; }
        .detail-card:nth-child(4) { animation-delay: 0.4s; }
        .detail-card:nth-child(5) { animation-delay: 0.5s; }
        .detail-card:nth-child(6) { animation-delay: 0.6s; }

        .detail-icon {
            font-size: 3em;
            margin-bottom: 15px;
            animation: bounce 2s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(79, 209, 197, 0.5));
        }

        .detail-label {
            font-size: 0.95em;
            color: #4fd1c5;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .detail-value {
            font-size: 1.6em;
            font-weight: 700;
            color: #fff;
        }

        .forecast-section {
            margin-top: 50px;
            position: relative;
            z-index: 1;
        }

        .section-title {
            font-size: 2.2em;
            margin-bottom: 30px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #4fd1c5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: slideInLeft 0.8s ease;
        }

        .forecast-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }

        .forecast-card {
            background: rgba(10, 10, 15, 0.6);
            backdrop-filter: blur(20px) saturate(180%);
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid rgba(79, 209, 197, 0.2);
            animation: scaleIn 0.8s ease backwards;
            position: relative;
            overflow: hidden;
        }

        .forecast-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(79, 209, 197, 0.1) 0%, transparent 70%);
            transform: scale(0);
            transition: transform 0.5s;
        }

        .forecast-card:hover::before {
            transform: scale(1);
        }

        .forecast-card:nth-child(1) { animation-delay: 0.1s; }
        .forecast-card:nth-child(2) { animation-delay: 0.2s; }
        .forecast-card:nth-child(3) { animation-delay: 0.3s; }
        .forecast-card:nth-child(4) { animation-delay: 0.4s; }
        .forecast-card:nth-child(5) { animation-delay: 0.5s; }

        .forecast-card:hover {
            transform: translateY(-15px) scale(1.05);
            box-shadow: 
                0 15px 40px rgba(0, 0, 0, 0.5),
                0 0 50px rgba(79, 209, 197, 0.4);
            border-color: #4fd1c5;
            background: rgba(15, 20, 30, 0.8);
        }

        .forecast-date {
            font-size: 1.2em;
            font-weight: 700;
            margin-bottom: 20px;
            color: #4fd1c5;
            position: relative;
            z-index: 1;
        }

        .forecast-icon {
            width: 100px;
            height: 100px;
            margin: 15px auto;
            filter: drop-shadow(0 0 20px rgba(79, 209, 197, 0.4));
            animation: float 3s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        .forecast-temp {
            font-size: 2.2em;
            font-weight: 900;
            margin: 15px 0;
            background: linear-gradient(135deg, #fff 0%, #4fd1c5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            z-index: 1;
        }

        .forecast-description {
            text-transform: capitalize;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 15px;
            font-size: 1.1em;
            position: relative;
            z-index: 1;
        }

        .forecast-details {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid rgba(79, 209, 197, 0.2);
            position: relative;
            z-index: 1;
        }

        .forecast-detail-item {
            font-size: 0.95em;
            color: #4fd1c5;
            font-weight: 600;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 2px solid rgba(239, 68, 68, 0.5);
            border-radius: 20px;
            padding: 25px;
            margin: 25px 0;
            text-align: center;
            font-size: 1.2em;
            animation: fadeInUp 0.5s ease;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.3);
        }

        .success-message {
            background: rgba(34, 197, 94, 0.2);
            border: 2px solid rgba(34, 197, 94, 0.5);
            border-radius: 20px;
            padding: 25px;
            margin: 25px 0;
            text-align: center;
            font-size: 1.2em;
            animation: fadeInUp 0.5s ease;
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.3);
            color: #4ade80;
        }

        .sun-times {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin: 30px 0;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        .sun-time {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(10, 10, 15, 0.6);
            padding: 20px 35px;
            border-radius: 20px;
            border: 2px solid rgba(79, 209, 197, 0.2);
            transition: all 0.4s ease;
            animation: slideInLeft 0.8s ease;
        }

        .sun-time:nth-child(2) {
            animation: slideInRight 0.8s ease;
        }

        .sun-time:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(79, 209, 197, 0.3);
            border-color: #4fd1c5;
        }

        .sun-icon {
            font-size: 2.5em;
            animation: pulse 2s ease-in-out infinite;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5em;
            }

            .search-container, .current-weather, .email-alert-section {
                padding: 30px;
            }

            .search-box, .email-form {
                flex-direction: column;
            }

            input[type="text"], input[type="email"], button {
                width: 100%;
            }

            .temperature {
                font-size: 4em;
            }

            .weather-header {
                flex-direction: column;
                text-align: center;
            }

            .main-weather {
                flex-direction: column;
                text-align: center;
            }

            .location-info h2 {
                font-size: 2em;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2em;
            }

            .temperature {
                font-size: 3em;
            }

            .search-container, .current-weather, .email-alert-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ WEATHER FORECAST ⚡</h1>
            <p class="subtitle">Real-time Weather Intelligence System with Daily Email Alerts</p>
        </header>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Enter city name (e.g., London, Tokyo, New York)..." 
                       onkeypress="if(event.key === 'Enter') getWeather()">
                <button onclick="getWeather()">🔍 SEARCH</button>
                <button class="location-btn" onclick="getCurrentLocation()">📍 MY LOCATION</button>
            </div>
        </div>

        <!-- Email Alert Section -->
        <div class="email-alert-section">
            <h3>📧 Daily Weather Email Alerts</h3>
            <p>Get weather updates delivered to your inbox every day at 6:00 AM! No signup required.</p>
            <div class="email-form">
                <div class="form-group">
                    <label for="emailInput">Your Email Address</label>
                    <input type="email" id="emailInput" placeholder="Enter your email address...">
                </div>
                <div class="form-group">
                    <label for="emailCityInput">City for Alerts</label>
                    <input type="text" id="emailCityInput" placeholder="City name for daily updates...">
                </div>
                <button class="email-btn" onclick="subscribeToAlerts()">🔔 SUBSCRIBE TO ALERTS</button>
            </div>
            <div id="subscriptionStatus" class="subscription-status"></div>
        </div>

        <div class="loader" id="loader"></div>
        <div id="errorMessage"></div>

        <div class="current-weather" id="currentWeather">
            <div class="weather-header">
                <div class="location-info">
                    <h2 id="cityName"></h2>
                    <p class="date" id="currentDate"></p>
                </div>
            </div>

            <div class="sun-times" id="sunTimes"></div>

            <div class="main-weather">
                <div class="weather-icon-container">
                    <img id="weatherIcon" class="weather-icon" src="" alt="Weather Icon">
                </div>
                <div class="temp-display">
                    <div class="temperature" id="temperature"></div>
                    <div class="weather-description" id="description"></div>
                    <div class="feels-like" id="feelsLike"></div>
                </div>
            </div>

            <div class="weather-details" id="weatherDetails"></div>

            <div class="forecast-section">
                <h3 class="section-title">📅 5-Day Forecast</h3>
                <div class="forecast-container" id="forecastContainer"></div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = '9d42cb9a61d8b2dfb76f18b73b7634df'; // Replace with your API key

        // LocalStorage keys for subscriptions
        const SUBSCRIPTION_KEY = 'weatherEmailSubscriptions';

        function showLoader() {
            document.getElementById('loader').style.display = 'block';
            document.getElementById('currentWeather').classList.remove('show');
            document.getElementById('errorMessage').innerHTML = '';
        }

        function hideLoader() {
            document.getElementById('loader').style.display = 'none';
        }

        function showError(message) {
            document.getElementById('errorMessage').innerHTML = 
                `<div class="error-message">⚠️ ${message}</div>`;
            hideLoader();
        }

        function showSuccess(message) {
            document.getElementById('errorMessage').innerHTML = 
                `<div class="success-message">✅ ${message}</div>`;
        }

        async function getWeather() {
            const city = document.getElementById('cityInput').value.trim();
            
            if (!city) {
                showError('Please enter a city name');
                return;
            }

            showLoader();

            try {
                // Get current weather
                const currentResponse = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}`
                );
                
                if (!currentResponse.ok) {
                    throw new Error('City not found. Please check the spelling and try again.');
                }

                const currentData = await currentResponse.json();

                // Get 5-day forecast
                const forecastResponse = await fetch(
                    `https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${API_KEY}`
                );
                const forecastData = await forecastResponse.json();

                displayWeather(currentData, forecastData);
                hideLoader();
            } catch (error) {
                showError(error.message);
            }
        }

        async function getCurrentLocation() {
            if (!navigator.geolocation) {
                showError('Geolocation is not supported by your browser');
                return;
            }

            showLoader();

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const { latitude, longitude } = position.coords;

                    try {
                        // Get current weather by coordinates
                        const currentResponse = await fetch(
                            `https://api.openweathermap.org/data/2.5/weather?lat=${latitude}&lon=${longitude}&units=metric&appid=${API_KEY}`
                        );
                        const currentData = await currentResponse.json();

                        // Get forecast by coordinates
                        const forecastResponse = await fetch(
                            `https://api.openweathermap.org/data/2.5/forecast?lat=${latitude}&lon=${longitude}&units=metric&appid=${API_KEY}`
                        );
                        const forecastData = await forecastResponse.json();

                        displayWeather(currentData, forecastData);
                        document.getElementById('cityInput').value = currentData.name;
                        hideLoader();
                    } catch (error) {
                        showError('Unable to fetch weather for your location');
                    }
                },
                (error) => {
                    showError('Unable to retrieve your location. Please enter a city manually.');
                }
            );
        }

        function displayWeather(current, forecast) {
            // Display city and date
            document.getElementById('cityName').textContent = 
                `${current.name}, ${current.sys.country}`;
            document.getElementById('currentDate').textContent = 
                new Date().toLocaleDateString('en-US', { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

            // Display sunrise and sunset
            const sunrise = new Date(current.sys.sunrise * 1000).toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            const sunset = new Date(current.sys.sunset * 1000).toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });

            document.getElementById('sunTimes').innerHTML = `
                <div class="sun-time">
                    <span class="sun-icon">🌅</span>
                    <div>
                        <div style="font-size: 0.9em; color: rgba(79, 209, 197, 0.7);">Sunrise</div>
                        <div style="font-weight: 700; font-size: 1.2em;">${sunrise}</div>
                    </div>
                </div>
                <div class="sun-time">
                    <span class="sun-icon">🌇</span>
                    <div>
                        <div style="font-size: 0.9em; color: rgba(79, 209, 197, 0.7);">Sunset</div>
                        <div style="font-weight: 700; font-size: 1.2em;">${sunset}</div>
                    </div>
                </div>
            `;

            // Display main weather info
            document.getElementById('weatherIcon').src = 
                `https://openweathermap.org/img/wn/${current.weather[0].icon}@4x.png`;
            document.getElementById('temperature').textContent = 
                `${Math.round(current.main.temp)}°C`;
            document.getElementById('description').textContent = 
                current.weather[0].description;
            document.getElementById('feelsLike').textContent = 
                `Feels like ${Math.round(current.main.feels_like)}°C`;

            // Display weather details
            const details = [
                { icon: '💨', label: 'Wind Speed', value: `${current.wind.speed} m/s` },
                { icon: '💧', label: 'Humidity', value: `${current.main.humidity}%` },
                { icon: '🌡️', label: 'Pressure', value: `${current.main.pressure} hPa` },
                { icon: '👁️', label: 'Visibility', value: `${(current.visibility / 1000).toFixed(1)} km` },
                { icon: '☁️', label: 'Cloudiness', value: `${current.clouds.all}%` },
                { icon: '🧭', label: 'Wind Direction', value: `${getWindDirection(current.wind.deg)}` }
            ];

            if (current.rain && current.rain['1h']) {
                details.push({ icon: '🌧️', label: 'Rain (1h)', value: `${current.rain['1h']} mm` });
            }

            if (current.snow && current.snow['1h']) {
                details.push({ icon: '❄️', label: 'Snow (1h)', value: `${current.snow['1h']} mm` });
            }

            document.getElementById('weatherDetails').innerHTML = details.map(detail => `
                <div class="detail-card">
                    <div class="detail-icon">${detail.icon}</div>
                    <div class="detail-label">${detail.label}</div>
                    <div class="detail-value">${detail.value}</div>
                </div>
            `).join('');

            // Display 5-day forecast (one per day at noon)
            const dailyForecasts = forecast.list.filter(item => 
                item.dt_txt.includes('12:00:00')
            ).slice(0, 5);

            document.getElementById('forecastContainer').innerHTML = dailyForecasts.map(day => {
                const date = new Date(day.dt * 1000);
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                const monthDay = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

                return `
                    <div class="forecast-card">
                        <div class="forecast-date">${dayName}, ${monthDay}</div>
                        <img class="forecast-icon" 
                             src="https://openweathermap.org/img/wn/${day.weather[0].icon}@2x.png" 
                             alt="${day.weather[0].description}">
                        <div class="forecast-temp">${Math.round(day.main.temp)}°C</div>
                        <div class="forecast-description">${day.weather[0].description}</div>
                        <div class="forecast-details">
                            <div class="forecast-detail-item">
                                💨 ${day.wind.speed} m/s
                            </div>
                            <div class="forecast-detail-item">
                                💧 ${day.main.humidity}%
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('currentWeather').classList.add('show');
        }

        function getWindDirection(degrees) {
            const directions = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
            const index = Math.round(degrees / 45) % 8;
            return directions[index];
        }

        // Email Alert Subscription System
        async function subscribeToAlerts() {
            const email = document.getElementById('emailInput').value.trim();
            const city = document.getElementById('emailCityInput').value.trim();
            const statusDiv = document.getElementById('subscriptionStatus');

            if (!email) {
                statusDiv.textContent = '⚠️ Please enter your email address';
                statusDiv.className = 'subscription-status error-message';
                statusDiv.style.display = 'block';
                return;
            }

            if (!city) {
                statusDiv.textContent = '⚠️ Please enter a city name';
                statusDiv.className = 'subscription-status error-message';
                statusDiv.style.display = 'block';
                return;
            }

            // Validate email format
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                statusDiv.textContent = '⚠️ Please enter a valid email address';
                statusDiv.className = 'subscription-status error-message';
                statusDiv.style.display = 'block';
                return;
            }

            try {
                // Verify city exists
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}`
                );
                
                if (!response.ok) {
                    throw new Error('City not found. Please check the spelling.');
                }

                // Store subscription in localStorage
                const subscriptions = JSON.parse(localStorage.getItem(SUBSCRIPTION_KEY) || '[]');
                
                // Check if already subscribed
                const existingIndex = subscriptions.findIndex(sub => sub.email === email);
                
                if (existingIndex !== -1) {
                    // Update existing subscription
                    subscriptions[existingIndex] = { email, city, subscribedAt: new Date().toISOString() };
                } else {
                    // Add new subscription
                    subscriptions.push({ email, city, subscribedAt: new Date().toISOString() });
                }

                localStorage.setItem(SUBSCRIPTION_KEY, JSON.stringify(subscriptions));

                statusDiv.textContent = `✅ Successfully subscribed! You'll receive daily weather updates for ${city} at 6:00 AM.`;
                statusDiv.className = 'subscription-status success';
                statusDiv.style.display = 'block';

                // Clear inputs
                document.getElementById('emailInput').value = '';
                document.getElementById('emailCityInput').value = '';

                // Initialize daily email check
                checkAndScheduleEmails();

            } catch (error) {
                statusDiv.textContent = `⚠️ ${error.message}`;
                statusDiv.className = 'subscription-status error-message';
                statusDiv.style.display = 'block';
            }
        }

        // Check and schedule email sending
        function checkAndScheduleEmails() {
            const now = new Date();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();

            // Check if it's 6:00 AM (hour 6, minute 0)
            if (currentHour === 6 && currentMinute === 0) {
                sendScheduledEmails();
            }

            // Schedule next check at the next minute
            const nextCheck = 60000 - (now.getSeconds() * 1000 + now.getMilliseconds());
            setTimeout(checkAndScheduleEmails, nextCheck);
        }

        async function sendScheduledEmails() {
            const subscriptions = JSON.parse(localStorage.getItem(SUBSCRIPTION_KEY) || '[]');

            for (const subscription of subscriptions) {
                try {
                    await sendWeatherEmail(subscription.email, subscription.city);
                } catch (error) {
                    console.error(`Failed to send email to ${subscription.email}:`, error);
                }
            }
        }

        async function sendWeatherEmail(email, city) {
            try {
                // Get weather data
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}`
                );
                const weatherData = await response.json();

                // Get forecast
                const forecastResponse = await fetch(
                    `https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${API_KEY}`
                );
                const forecastData = await forecastResponse.json();

                // Create email content
                const emailContent = generateEmailContent(weatherData, forecastData);

                // Since we can't actually send emails from browser without a backend,
                // we'll show a notification that the email would have been sent
                console.log(`Email would be sent to: ${email}`);
                console.log(`Weather Report for ${city}:`, emailContent);

                // In a real implementation, you would use a backend service or email API here
                // For example: EmailJS, SendGrid, AWS SES, etc.

            } catch (error) {
                console.error('Error sending weather email:', error);
            }
        }

        function generateEmailContent(current, forecast) {
            const sunrise = new Date(current.sys.sunrise * 1000).toLocaleTimeString();
            const sunset = new Date(current.sys.sunset * 1000).toLocaleTimeString();

            return `
                Weather Report for ${current.name}, ${current.sys.country}
                Date: ${new Date().toLocaleDateString()}
                
                Current Weather:
                - Temperature: ${Math.round(current.main.temp)}°C
                - Feels Like: ${Math.round(current.main.feels_like)}°C
                - Condition: ${current.weather[0].description}
                - Humidity: ${current.main.humidity}%
                - Wind Speed: ${current.wind.speed} m/s
                - Sunrise: ${sunrise}
                - Sunset: ${sunset}
                
                Have a great day!
            `;
        }

        // Load weather for a default city on page load
        window.addEventListener('load', () => {
            document.getElementById('cityInput').value = 'London';
            getWeather();
            
            // Start email scheduling
            checkAndScheduleEmails();
            
            // Show info about subscriptions if any exist
            const subscriptions = JSON.parse(localStorage.getItem(SUBSCRIPTION_KEY) || '[]');
            if (subscriptions.length > 0) {
                const statusDiv = document.getElementById('subscriptionStatus');
                statusDiv.textContent = `ℹ️ You have ${subscriptions.length} active weather alert subscription(s).`;
                statusDiv.className = 'subscription-status info';
                statusDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
